<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Neon Snake · Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            background: radial-gradient(ellipse at 50% 0%, #1a1f33 0%, #0b0e1a 70%);
            border-radius: 32px;
            padding: 24px 28px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.04);
            max-width: 500px;
            width: 96%;
            position: relative;
        }
        .game-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.15), transparent 50%, rgba(0, 200, 255, 0.10));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 4px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .header .title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffc8, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.20);
        }
        .header .stats span {
            color: #fff;
        }
        .header .stats .score-val {
            color: #00ffc8;
        }
        .header .stats .high-val {
            color: #ffcc00;
        }
        .canvas-wrap {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: #0f1320;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: transparent;
            touch-action: none;
            cursor: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 14, 26, 0.80);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.4s ease;
            gap: 16px;
            padding: 20px;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .overlay h2 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
        .overlay .sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        .overlay .final-score {
            font-size: 22px;
            color: #00ffc8;
            font-weight: 700;
        }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #00ffc8, #00b8ff);
            color: #0b0e1a;
            box-shadow: 0 4px 20px rgba(0, 255, 200, 0.25);
            letter-spacing: 0.5px;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 30px rgba(0, 255, 200, 0.35);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .touch-controls {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .touch-controls.visible {
            display: flex;
        }
        .touch-btn {
            width: 68px;
            height: 68px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.1s;
            touch-action: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            font-weight: 300;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.92);
        }
        .touch-grid {
            display: grid;
            grid-template-columns: 68px 68px 68px;
            grid-template-rows: 68px 68px;
            gap: 8px;
        }
        .touch-grid .touch-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
        .touch-grid .touch-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
        .touch-grid .touch-btn:nth-child(3) { grid-column: 3; grid-row: 2; }
        .touch-grid .touch-btn:nth-child(4) { grid-column: 2; grid-row: 2; }

        @media (pointer: coarse) {
            .touch-controls.visible {
                display: flex;
            }
        }
        @media (max-width: 500px) {
            .game-wrapper {
                padding: 16px 14px 18px 14px;
                border-radius: 20px;
            }
            .header .title {
                font-size: 17px;
            }
            .header .stats {
                font-size: 13px;
            }
            .overlay h2 {
                font-size: 26px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            .touch-btn {
                width: 58px;
                height: 58px;
                font-size: 22px;
            }
            .touch-grid {
                grid-template-columns: 58px 58px 58px;
                grid-template-rows: 58px 58px;
                gap: 6px;
            }
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header" id="gameHeader">
            <span class="title">⟡ SNAKE</span>
            <div class="stats">
                <span>🏆 <span class="score-val" id="scoreDisplay">0</span></span>
                <span style="margin-left:12px;">👑 <span class="high-val" id="highScoreDisplay">0</span></span>
            </div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">⟡ NEON SNAKE</h2>
                <div class="sub" id="overlaySub">Classic · Premium</div>
                <div class="final-score" id="finalScore" style="display:none;">Score: 0</div>
                <button class="btn" id="overlayActionBtn">▶&nbsp; START</button>
            </div>
        </div>

        <div class="touch-controls" id="touchControls">
            <div class="touch-grid">
                <button class="touch-btn" id="btnUp">⬆</button>
                <button class="touch-btn" id="btnLeft">⬅</button>
                <button class="touch-btn" id="btnRight">➡</button>
                <button class="touch-btn" id="btnDown">⬇</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  NEON SNAKE · Premium · with Sound Effects
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400,
            H = 400;
        const GRID = 20;
        const COLS = W / GRID,
            ROWS = H / GRID;

        // DOM refs
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const finalScore = document.getElementById('finalScore');
        const overlayActionBtn = document.getElementById('overlayActionBtn');
        const gameHeader = document.getElementById('gameHeader');
        const touchControls = document.getElementById('touchControls');

        // ----- Audio (Web Audio) -----
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            // Resume if suspended (mobile autoplay policy)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, duration, type = 'sine', vol = 0.15) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (_) { /* silent fail */ }
        }

        function sfxEat() {
            // Ascending blip
            playTone(600, 0.08, 'square', 0.10);
            setTimeout(() => playTone(800, 0.08, 'square', 0.10), 60);
        }

        function sfxGameOver() {
            // Descending tone
            playTone(400, 0.20, 'sawtooth', 0.12);
            setTimeout(() => playTone(300, 0.20, 'sawtooth', 0.12), 180);
            setTimeout(() => playTone(200, 0.30, 'sawtooth', 0.10), 360);
        }

        function sfxStart() {
            playTone(500, 0.10, 'sine', 0.10);
            setTimeout(() => playTone(700, 0.10, 'sine', 0.10), 100);
        }

        // ----- Game state -----
        let snake = [{ x: 5, y: 5 }];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 10, y: 10 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snake_high')) || 0;
        let gameRunning = false;
        let gameOver = false;
        let loopRunning = false;
        let frameId = null;

        const TICK_INTERVAL = 150;
        let accumulator = 0;
        let lastTimestamp = 0;

        // ----- UI update -----
        let uiScore = -1,
            uiHigh = -1;

        function updateUI() {
            if (uiScore !== score) {
                uiScore = score;
                scoreDisplay.textContent = score;
            }
            if (uiHigh !== highScore) {
                uiHigh = highScore;
                highScoreDisplay.textContent = highScore;
            }
        }

        // ----- Food placement -----
        function placeFood() {
            let pos;
            let attempts = 0;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                attempts++;
            } while (snake.some(s => s.x === pos.x && s.y === pos.y) && attempts < 100);
            food = pos;
        }

        // ----- Reset game -----
        function resetGame() {
            snake = [{ x: 5, y: 5 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            gameRunning = true;
            placeFood();
            updateUI();
            hideOverlay();
            sfxStart();
        }

        // ----- Overlay helpers -----
        function showOverlay(title, sub, actionLabel, showScore = false, scoreText = '') {
            overlay.classList.remove('hidden');
            overlayTitle.textContent = title;
            overlaySub.textContent = sub;
            if (showScore) {
                finalScore.style.display = 'block';
                finalScore.textContent = scoreText;
            } else {
                finalScore.style.display = 'none';
            }
            overlayActionBtn.textContent = actionLabel;
        }

        function hideOverlay() {
            overlay.classList.add('hidden');
        }

        // ----- Game logic update (tick) -----
        function updateGame() {
            if (!gameRunning || gameOver) return;

            direction = { ...nextDirection };

            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Wall collision
            if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
                gameOver = true;
                gameRunning = false;
                sfxGameOver();
                handleGameOver();
                return;
            }

            // Self collision (except tail if eating)
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            let collision = false;
            for (let i = 0; i < snake.length; i++) {
                if (willEat && i === snake.length - 1) continue;
                if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    collision = true;
                    break;
                }
            }
            if (collision) {
                gameOver = true;
                gameRunning = false;
                sfxGameOver();
                handleGameOver();
                return;
            }

            // Move
            snake.unshift(newHead);
            if (willEat) {
                score++;
                sfxEat();
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snake_high', String(highScore));
                }
                updateUI();
                placeFood();
            } else {
                snake.pop();
            }
        }

        // ----- Game over handler -----
        function handleGameOver() {
            showOverlay(
                '💔 GAME OVER',
                `You scored ${score}`,
                '🔄 Replay',
                true,
                `Score: ${score}  •  Best: ${highScore}`
            );
            overlayActionBtn.onclick = () => { startGame(); };
        }

        // ----- Start game -----
        function startGame() {
            initAudio(); // unlock audio
            gameHeader.style.display = 'flex';
            touchControls.classList.add('visible');

            resetGame();
            if (!loopRunning) startLoop();
        }

        // ----- Rendering (60fps) -----
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= W; x += GRID) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += GRID) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // Snake
            snake.forEach((seg, idx) => {
                const isHead = idx === 0;
                const x = seg.x * GRID,
                    y = seg.y * GRID;
                const gradient = ctx.createRadialGradient(x + 6, y + 6, 2, x + 10, y + 10, 14);
                if (isHead) {
                    gradient.addColorStop(0, '#66ffdd');
                    gradient.addColorStop(1, '#00ccaa');
                } else {
                    const intensity = 0.5 + 0.5 * (1 - idx / snake.length);
                    gradient.addColorStop(0, `rgba(0, 255, 200, ${intensity})`);
                    gradient.addColorStop(1, `rgba(0, 180, 150, ${intensity * 0.7})`);
                }
                ctx.shadowColor = isHead ? '#00ffc8' : 'rgba(0,255,200,0.2)';
                ctx.shadowBlur = isHead ? 20 : 8;
                ctx.fillStyle = gradient;
                const r = 4;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, GRID - 4, GRID - 4, r);
                ctx.fill();

                if (isHead) {
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = 'rgba(0,255,200,0.15)';
                    ctx.beginPath();
                    ctx.arc(x + GRID / 2, y + GRID / 2, 14, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            // Food
            const fx = food.x * GRID + GRID / 2;
            const fy = food.y * GRID + GRID / 2;
            const gradientFood = ctx.createRadialGradient(fx - 3, fy - 3, 2, fx, fy, 14);
            gradientFood.addColorStop(0, '#ff6b6b');
            gradientFood.addColorStop(0.7, '#ff3333');
            gradientFood.addColorStop(1, '#cc0000');
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 25;
            ctx.fillStyle = gradientFood;
            ctx.beginPath();
            ctx.arc(fx, fy, 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(fx - 3, fy - 4, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        // ----- Main loop (fixed timestep) -----
        function loop(timestamp) {
            if (!loopRunning) return;

            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = Math.min(timestamp - lastTimestamp, 50);
            lastTimestamp = timestamp;

            accumulator += delta;
            while (accumulator >= TICK_INTERVAL) {
                updateGame();
                accumulator -= TICK_INTERVAL;
                if (!gameRunning && gameOver) break;
            }

            draw();
            frameId = requestAnimationFrame(loop);
        }

        function startLoop() {
            if (loopRunning) return;
            loopRunning = true;
            lastTimestamp = 0;
            accumulator = 0;
            if (frameId) cancelAnimationFrame(frameId);
            frameId = requestAnimationFrame(loop);
        }

        // ----- Keyboard controls -----
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') {
                if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                e.preventDefault();
            } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
                if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                e.preventDefault();
            } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                e.preventDefault();
            } else if (key === 'Enter' || key === ' ') {
                if (!gameRunning && !gameOver) startGame();
                else if (gameOver) startGame();
                e.preventDefault();
            }
        });

        // ----- Touch buttons -----
        function bindTouchButton(id, dir) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                if (dir.x !== 0 && direction.x === -dir.x) return;
                if (dir.y !== 0 && direction.y === -dir.y) return;
                nextDirection = dir;
            }, { passive: false });
            btn.addEventListener('mousedown', () => {
                initAudio();
                if (dir.x !== 0 && direction.x === -dir.x) return;
                if (dir.y !== 0 && direction.y === -dir.y) return;
                nextDirection = dir;
            });
        }
        bindTouchButton('btnUp', { x: 0, y: -1 });
        bindTouchButton('btnDown', { x: 0, y: 1 });
        bindTouchButton('btnLeft', { x: -1, y: 0 });
        bindTouchButton('btnRight', { x: 1, y: 0 });

        // ----- Overlay action button -----
        overlayActionBtn.addEventListener('click', () => {
            initAudio();
            startGame();
        });

        // ----- Swipe controls on canvas -----
        let touchStartX = 0,
            touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning || gameOver) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const dx = (touch.clientX - rect.left) - touchStartX;
            const dy = (touch.clientY - rect.top) - touchStartY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
            touchStartX = (touch.clientX - rect.left);
            touchStartY = (touch.clientY - rect.top);
        }, { passive: false });

        // ----- Init -----
        function init() {
            highScoreDisplay.textContent = highScore;
            placeFood();
            showOverlay('⟡ NEON SNAKE', 'Classic · Premium', '▶ START', false);
            overlayActionBtn.onclick = () => { initAudio();
                startGame(); };
            draw();
            startLoop();
        }

        init();
    </script>

</body>
</html>
